automation:
  - id: master_bedroom_heat
    alias: _Soverom varme
    description: ''
    trigger:
    - platform: time
      at: '18:00'
    - platform: state
      entity_id: binary_sensor.master_bedroom_magnet_window_contact
    - platform: numeric_state
      entity_id: sensor.master_bedroom_climate_temperature
      for:
        hours: 0
        minutes: 5
        seconds: 0
      below: '20'
    - platform: numeric_state
      entity_id: sensor.master_bedroom_climate_temperature
      for:
        hours: 0
        minutes: 5
        seconds: 0
      above: '25'
    condition: []
    action:
    - choose:
      - conditions:
        - condition: numeric_state
          entity_id: sensor.master_bedroom_climate_temperature
          below: '20'
        - condition: state
          entity_id: binary_sensor.master_bedroom_magnet_window_contact
          state: 'off'
        - condition: time
          after: '18:00:00'
          before: 06:30:00
          weekday: []
        sequence:
        - service: switch.turn_on
          data: {}
          target:
            entity_id: switch.master_bedroom_heater_plug
      - conditions:
        - condition: or
          conditions:
          - condition: state
            entity_id: binary_sensor.master_bedroom_magnet_window_contact
            state: 'on'
          - condition: numeric_state
            entity_id: sensor.master_bedroom_climate_temperature
            above: '25'
        sequence:
        - service: switch.turn_off
          data: {}
          target:
            entity_id: switch.master_bedroom_heater_plug
      - conditions:
        - condition: numeric_state
          entity_id: sensor.master_bedroom_climate_temperature
          below: '20'
        - condition: state
          entity_id: binary_sensor.master_bedroom_magnet_window_contact
          state: 'on'
        - condition: time
          after: '18:00:00'
          before: '18:01:00'
          weekday: []
        sequence:
        - service: notify.mobile_app_kb2003
          data: 
            message: Vinduet på soverommet er åpent. Lukk vinduet for å slå på varme.
            title: Åpent vindu
        # - service: notify.mobile_app_sbm_2016
        #   data:
        #     message: Vinduet på soverommet er åpent. Lukk vinduet for å slå på varme.
        #     title: Åpent vindu  
      default: []
    mode: single
  
