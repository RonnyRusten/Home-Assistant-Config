automation:
  - id: "check_power_consumption"
    alias: _Check power consumption
    description: "Runs every 5 minutes, runs script to check power consumption"
    trigger:
      - platform: time_pattern
        minutes: /5
      - platform: numeric_state
        entity_id: sensor.power_usage_current_hour_estimated_from_last_15_min
        above: "4.95"
        for:
          hours: 0
          minutes: 0
          seconds: 30
      - platform: numeric_state
        entity_id: sensor.power_usage_current_hour_estimated_from_last_15_min
        below: "4.95"
        for:
          hours: 0
          minutes: 1
          seconds: 0
    condition: []
    action:
      - service: script.power_control
    mode: single

script:
  power_control:
    alias: Control power consumption
    icon: mdi:flash
    description: "Turn on and of utilities to control power consumption"
    mode: restart
    variables:
      power_limit: 5
    sequence:
    - choose:
      - conditions:
        - condition: numeric_state
          entity_id: sensor.power_usage_current_hour_estimated_from_last_15_min
          above: '5'
        - condition: state
          entity_id: climate.basement_hall_floor_heating
          state: 'heating'
          attribute: hvac_action
        sequence:
        - service: climate.set_temperature
          target:
            entity_id: climate.basement_hall_floor_heating
          data:
            temperature: 20
      - conditions:
        - condition: numeric_state
          entity_id: sensor.power_usage_current_hour_estimated_from_last_15_min
          above: '5'
        - condition: state
          entity_id: climate.basement_hall_floor_heating
          state: 'idle'
          attribute: hvac_action
        - condition: state
          entity_id: switch.hot_water_plug
          state: 'on'
        sequence:
        - service: switch.turn_off
          target:
            entity_id: switch.hot_water_plug
      - conditions:
        - condition: numeric_state
          entity_id: sensor.power_usage_current_hour_estimated_from_last_15_min
          below: '5'
        - condition: state
          entity_id: climate.basement_hall_floor_heating
          state: 'idle'
          attribute: hvac_action
        - condition: state
          entity_id: switch.hot_water_plug
          state: 'off'
        sequence:
        - service: switch.turn_on
          target:
            entity_id: switch.hot_water_plug
      - conditions:
        - condition: numeric_state
          entity_id: sensor.power_usage_current_hour_estimated_from_last_15_min
          below: '5'
        - condition: state
          entity_id: climate.basement_hall_floor_heating
          state: 'idle'
          attribute: hvac_action
        sequence:
        - service: climate.set_temperature
          target:
            entity_id: climate.basement_hall_floor_heating
          data:
            temperature: 24
      default: []

utility_meter:
  total_hourly_energy:
    source: sensor.energy_total
    name: consumption current hour
    cycle: hourly
  
  total_daily_energy:
    source: sensor.energy_total
    name: Totalt daglig
    cycle: daily
  
  total_weekly_energy:
    source: sensor.energy_total
    name: Totalt ukentlig
    cycle: weekly
  
  total_monthly_energy:
    source: sensor.energy_total
    name: Totalt månedlig
    cycle: monthly

  total_yearly_energy:
    source: sensor.energy_total
    name: Totalt årlig
    cycle: yearly
    
  monthly_energy_cost:
    source: sensor.energy_total_cost
    name: monthly_energy_cost
    cycle: monthly